name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: sansursuz-macos-arm64
          - goos: darwin
            goarch: amd64
            name: sansursuz-macos-amd64
          - goos: windows
            goarch: amd64
            name: sansursuz-windows-amd64.exe
          - goos: linux
            goarch: amd64
            name: sansursuz-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.name }} ./cmd/sansursuz/

      - name: Create macOS .app bundle
        if: matrix.goos == 'darwin'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          APP_NAME="Sansursuz.app"
          mkdir -p "${APP_NAME}/Contents/MacOS"
          mkdir -p "${APP_NAME}/Contents/Resources"
          
          mv ${{ matrix.name }} "${APP_NAME}/Contents/MacOS/sansursuz"
          chmod +x "${APP_NAME}/Contents/MacOS/sansursuz"
          
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>CFBundleExecutable</key>\n<string>sansursuz</string>\n<key>CFBundleIdentifier</key>\n<string>com.bexcod.sansursuz</string>\n<key>CFBundleName</key>\n<string>Sansursuz</string>\n<key>CFBundleDisplayName</key>\n<string>Sansursuz</string>\n<key>CFBundleVersion</key>\n<string>%s</string>\n<key>CFBundleShortVersionString</key>\n<string>%s</string>\n<key>CFBundlePackageType</key>\n<string>APPL</string>\n<key>LSMinimumSystemVersion</key>\n<string>11.0</string>\n<key>LSUIElement</key>\n<true/>\n<key>NSHighResolutionCapable</key>\n<true/>\n</dict>\n</plist>\n' "$TAG_NAME" "$TAG_NAME" > "${APP_NAME}/Contents/Info.plist"
          
          ARCH=$(echo "${{ matrix.name }}" | sed 's/sansursuz-macos-//')
          zip -r "sansursuz-macos-${ARCH}.zip" "${APP_NAME}"

      - name: Upload artifact (macOS)
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: "*.zip"

      - name: Upload artifact (other)
        if: matrix.goos != 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body: |
            ## Sansürsüz ${{ github.ref_name }}

            ### 📥 İndirme
            | Platform | Dosya | Kurulum |
            |---|---|---|
            | macOS (M1/M2) | `sansursuz-macos-arm64.zip` | Zip'i açın → Sansürsüz.app'i Applications'a sürükleyin |
            | macOS (Intel) | `sansursuz-macos-amd64.zip` | Zip'i açın → Sansürsüz.app'i Applications'a sürükleyin |
            | Windows | `sansursuz-windows-amd64.exe` | İndirin → Çift tıklayın |
            | Linux | `sansursuz-linux-amd64` | İndirin → `chmod +x` → Çalıştırın |

            ### ⚠️ macOS İlk Çalıştırma
            İlk açılışta Gatekeeper uyarısı alırsanız: **Sağ tıklayın → Aç** seçin.

            ### 🚀 Kullanım
            Uygulama başladığında tarayıcıda kontrol paneli otomatik açılır.
