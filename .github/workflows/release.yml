name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: sansursuz-macos-arm64
          - goos: darwin
            goarch: amd64
            name: sansursuz-macos-amd64
          - goos: windows
            goarch: amd64
            name: sansursuz-windows-amd64.exe
          - goos: linux
            goarch: amd64
            name: sansursuz-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.name }} ./cmd/alcatraz/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body: |
            ## Sansürsüz ${{ github.ref_name }}

            ### 📥 İndirme
            | Platform | Dosya |
            |---|---|
            | macOS (M1/M2) | `sansursuz-macos-arm64` |
            | macOS (Intel) | `sansursuz-macos-amd64` |
            | Windows | `sansursuz-windows-amd64.exe` |
            | Linux | `sansursuz-linux-amd64` |

            **Kullanım:** İndirin → Çalıştırın → Tarayıcıda `http://127.0.0.1:8444` açın
